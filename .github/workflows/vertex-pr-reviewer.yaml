name: Vertex AI PR Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    uses: paritytech/ci-actions/.github/workflows/vertex-pr-reviewer.yaml@main
    with:
      comment_trigger: "/aireview"
    secrets:
      GCP_SA_GITHUB_VAI: ${{ secrets.GCP_SA_GITHUB_VAI }}
      GCP_WIP_GITHUB_VAI: ${{ secrets.GCP_WIP_GITHUB_VAI }}
